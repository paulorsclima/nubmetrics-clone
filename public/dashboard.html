<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NubMetrics - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-chart-line"></i>
        <span>NubMetrics</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/vendas.html" class="nav-item"><i class="fas fa-shopping-bag"></i> Vendas</a>
        <a href="/produtos.html" class="nav-item"><i class="fas fa-box"></i> Produtos</a>
        <a href="/anuncios.html" class="nav-item"><i class="fas fa-tag"></i> Anúncios</a>
        <a href="/perguntas.html" class="nav-item"><i class="fas fa-question-circle"></i> Perguntas</a>
        <a href="/relatorios.html" class="nav-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/auth/logout" class="nav-item"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </div>
    </aside>

    <!-- Conteúdo -->
    <main class="main-content">
      <header class="topbar">
        <button class="btn-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2>Dashboard</h2>
        <span id="userName" class="user-name"></span>
      </header>

      <!-- Cards de resumo -->
      <section class="cards-grid">
        <div class="card">
          <i class="fas fa-dollar-sign"></i>
          <div>
            <p>Total de Vendas</p>
            <h3 id="totalVendas">R$ 0,00</h3>
          </div>
        </div>
        <div class="card">
          <i class="fas fa-shopping-cart"></i>
          <div>
            <p>Total de Pedidos</p>
            <h3 id="totalPedidos">0</h3>
          </div>
        </div>
        <div class="card">
          <i class="fas fa-receipt"></i>
          <div>
            <p>Ticket Médio</p>
            <h3 id="ticketMedio">R$ 0,00</h3>
          </div>
        </div>
        <div class="card">
          <i class="fas fa-eye"></i>
          <div>
            <p>Total de Visitas</p>
            <h3 id="totalVisitas">0</h3>
          </div>
        </div>
      </section>

      <!-- Gráficos -->
      <section class="graficos-grid">
        <div class="grafico-card">
          <h4>Vendas por Dia</h4>
          <canvas id="graficoVendas"></canvas>
        </div>
        <div class="grafico-card">
          <h4>Top Produtos</h4>
          <canvas id="graficoProdutos"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
