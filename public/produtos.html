<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NubMetrics - Produtos</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-chart-line"></i>
        <span>NubMetrics</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/vendas.html" class="nav-item"><i class="fas fa-shopping-bag"></i> Vendas</a>
        <a href="/produtos.html" class="nav-item active"><i class="fas fa-box"></i> Produtos</a>
        <a href="/anuncios.html" class="nav-item"><i class="fas fa-tag"></i> Anúncios</a>
        <a href="/perguntas.html" class="nav-item"><i class="fas fa-question-circle"></i> Perguntas</a>
        <a href="/relatorios.html" class="nav-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <a href="/auth/logout" class="nav-item"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="btn-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2>Produtos</h2>
        <span id="userName" class="user-name"></span>
      </header>

      <section class="content-card">
        <div class="filters">
          <input type="text" id="buscaProduto" placeholder="Buscar produto..."/>
          <button onclick="filtrarProdutos()">Filtrar</button>
        </div>

        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Imagem</th>
                <th>Título</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tabelaProdutos"></tbody>
          </table>
        </div>

        <div id="paginacaoProdutos" class="paginacao"></div>
      </section>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/produtos.js"></script>
</body>
</html>
