<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NubMetrics - Inteligência para Mercado Livre</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <i class="fas fa-chart-line"></i>
      <h1>NubMetrics</h1>
      <p>Inteligência de dados para o Mercado Livre</p>
    </div>
    <div class="login-card">
      <h2>Bem-vindo</h2>
      <p>Conecte sua conta do Mercado Livre para acessar seu painel de analytics.</p>
      <a href="/auth/login" class="btn-ml">
        <i class="fas fa-shopping-cart"></i> Entrar com Mercado Livre
      </a>
      <div class="login-features">
        <div class="feature"><i class="fas fa-chart-bar"></i><span>Análise de Vendas</span></div>
        <div class="feature"><i class="fas fa-users"></i><span>Monitorar Concorrentes</span></div>
        <div class="feature"><i class="fas fa-fire"></i><span>Tendências do Mercado</span></div>
        <div class="feature"><i class="fas fa-tag"></i><span>Gestão de Anúncios</span></div>
      </div>
    </div>
  </div>
</body>
</html>
